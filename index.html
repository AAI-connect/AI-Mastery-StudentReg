<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mastery Registration</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #002b2d 0%, #001a1a 100%);
            --accent-glow: #00f2ff;
            --input-bg: rgba(0, 242, 255, 0.05);
            --text-color: #e0fbff;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: var(--accent-glow);
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        h2 {
            text-align: center;
            font-weight: 300;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            background: rgba(0, 242, 255, 0.1);
        }

        .status-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .status-options label {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid rgba(0, 242, 255, 0.2);
            transition: 0.3s;
        }

        .status-options input[type="radio"] {
            display: none;
        }

        .status-options input[type="radio"]:checked + label {
            background: var(--accent-glow);
            color: #001a1a;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-register {
            background: var(--accent-glow);
            color: #001a1a;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--accent-glow), transparent);
            margin: 30px 0;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-whatsapp:hover {
            background: #1eb954;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Mastery Course</h1>
    <h2>Student Registration</h2>

    <form id="registrationForm">
        <div class="form-group">
            <input type="text" name="firstName" placeholder="First Name" required>
        </div>
        <div class="form-group">
            <input type="text" name="lastName" placeholder="Last Name" required>
        </div>
        <div class="form-group">
            <input type="text" name="hometown" placeholder="Hometown" required>
        </div>
        <div class="form-group">
            <input type="number" name="age" placeholder="Age" required>
        </div>
        <div class="form-group">
            <input type="email" name="email" placeholder="Email Address" required>
        </div>
        <div class="form-group">
            <input type="tel" name="phone" placeholder="Phone Number" required>
        </div>

        <label>Status (Optional):</label>
        <div class="status-options">
            <input type="radio" id="student" name="status" value="Student">
            <label for="student">Student</label>
            
            <input type="radio" id="undergrad" name="status" value="Undergraduate">
            <label for="undergrad">Undergraduate</label>
            
            <input type="radio" id="graduate" name="status" value="Graduate">
            <label for="graduate">Graduate</label>
            
            <input type="radio" id="employee" name="status" value="Employee">
            <label for="employee">Employee</label>
            
            <input type="radio" id="entrepreneur" name="status" value="Entrepreneur">
            <label for="entrepreneur">Entrepreneur</label>
        </div>

        <button type="submit" class="btn-register">Register Now</button>
    </form>

    <hr>

    <a href="https://wa.me/94712220206" class="btn-whatsapp" target="_blank">
        Contact on WhatsApp
    </a>
</div>

<script>
    // REPLACE THIS URL with your Google Apps Script Web App URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyEsF7y888KQu-1UeVB-nqt3MSP3bqFuBlF5Vcd008Ls0sh5lHXwNnc56280GiXJCJ9/exec';
    const form = document.getElementById('registrationForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // Show loading state
        const btn = form.querySelector('.btn-register');
        btn.innerText = 'Processing...';
        btn.disabled = true;

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert('Success! You are registered.');
                btn.innerText = 'Register Now';
                btn.disabled = false;
                form.reset();
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('Registration failed. Please check the Script URL.');
                btn.innerText = 'Register Now';
                btn.disabled = false;
            });
    });
</script>

</body>
</html>
