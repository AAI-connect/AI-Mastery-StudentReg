<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | AI Mastery Course - NUAIY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #002d72;
            --light-blue: #00aaff;
            --silver: #e0e0e0;
            --white: #ffffff;
            --glow: rgba(0, 170, 255, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px 0;
            color: var(--primary-blue);
        }

        .container {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .logo {
            width: 180px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--silver);
            border-radius: 8px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--light-blue);
            box-shadow: 0 0 12px var(--glow);
        }

        .status-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .status-btn {
            padding: 10px;
            border: 1px solid var(--silver);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
            text-align: center;
        }

        .status-btn.active {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
            box-shadow: 0 0 10px var(--glow);
        }

        .register-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .register-btn:hover {
            box-shadow: 0 0 20px var(--glow);
            transform: translateY(-2px);
        }

        hr {
            margin: 40px 0;
            border: 0;
            border-top: 1px solid var(--silver);
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            color: #25D366;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid #25D366;
            padding: 12px 24px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .whatsapp-btn:hover {
            background: #25D366;
            color: white;
        }

        #msg { margin-top: 15px; color: #00aaff; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.ibb.co/C5fRj9V/nuaiy-logo.jpg" alt="Nuaiy Logo" class="logo">
    
    <form id="regForm">
        <div class="form-group">
            <label>Unit ID</label>
            <input type="text" name="unitId" placeholder="Enter your Unit ID" required>
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" name="firstName" placeholder="First Name" required>
                <input type="text" name="lastName" placeholder="Last Name" required>
            </div>
        </div>

        <div class="form-group">
            <label>Hometown</label>
            <input type="text" name="hometown" required>
        </div>

        <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Age</label>
                <input type="number" name="age" required>
            </div>
            <div style="flex: 2;">
                <label>Phone Number</label>
                <input type="tel" name="phone" required>
            </div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Status (Optional Selection)</label>
            <div class="status-options">
                <div class="status-btn" onclick="setStatus('Student', this)">Student</div>
                <div class="status-btn" onclick="setStatus('Undergraduate', this)">Undergraduate</div>
                <div class="status-btn" onclick="setStatus('Graduate', this)">Graduate</div>
                <div class="status-btn" onclick="setStatus('Employee', this)">Employee</div>
                <div class="status-btn" onclick="setStatus('Entrepreneur', this)">Entrepreneur</div>
            </div>
            <input type="hidden" name="status" id="statusInput">
        </div>

        <button type="submit" class="register-btn">Register</button>
        <p id="msg">Registration sent successfully!</p>
    </form>

    <hr>

    <a href="https://wa.me/94712220206" class="whatsapp-btn">
        Contact on WhatsApp
    </a>
</div>

<script>
    function setStatus(val, el) {
        document.querySelectorAll('.status-btn').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('statusInput').value = val;
    }

    // IMPORTANT: Replace the URL below with your actual Google Script Web App URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyEsF7y888KQu-1UeVB-nqt3MSP3bqFuBlF5Vcd008Ls0sh5lHXwNnc56280GiXJCJ9/exec'; 
    const form = document.getElementById('regForm');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', e => {
        e.preventDefault();
        const submitBtn = form.querySelector('.register-btn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = "Submitting...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                msg.style.display = "block";
                submitBtn.innerHTML = "Register";
                submitBtn.disabled = false;
                form.reset();
                document.querySelectorAll('.status-btn').forEach(btn => btn.classList.remove('active'));
                setTimeout(() => { msg.style.display = "none"; }, 5000);
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("Something went wrong. Please check your connection.");
                submitBtn.disabled = false;
                submitBtn.innerHTML = "Register";
            });
    });
</script>

</body>
</html>
